<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <title>유찬 플레이어</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>

<body>

<div class="app">

  <section id="setup" class="panel setup">

    <h1>유찬 영상 플레이어</h1>

    <p>
      유튜브 링크를 붙여넣어주세요.
      <br>
      엔터, 쉼표(,), 공백 모두 지원합니다.
    </p>

    <textarea
      id="linksInput"
      placeholder="https://youtu.be/aaa
https://youtu.be/bbb
https://youtu.be/ccc"></textarea>

    <div class="input-buttons">
      <button id="clearLinksBtn" type="button">링크 비우기</button>
    </div>

    <div class="playlist-box">
      <h3>재생목록 저장 / 불러오기</h3>

      <div class="playlist-save-row">
        <input
          type="text"
          id="playlistName"
          placeholder="재생목록 이름">

        <button id="savePlaylistBtn" type="button">
          저장
        </button>
      </div>

      <div class="playlist-load-row">
        <select id="playlistSelect">
          <option value="">저장된 재생목록 선택</option>
        </select>

        <button id="loadPlaylistBtn" type="button">
          불러오기
        </button>

        <button id="deletePlaylistBtn" type="button">
          삭제
        </button>
      </div>
    </div>

    <div class="qr-box">
      <h3>QR 사진에서 링크 가져오기</h3>

      <div class="qr-upload-row">
        <input
          type="file"
          id="imageFiles"
          accept="image/*"
          multiple>

        <input
          type="file"
          id="cameraFile"
          accept="image/*"
          capture="environment"
          style="display:none">

        <button id="cameraBtn" type="button">
          📷 사진 촬영
        </button>
      </div>

      <div class="qr-buttons">
        <button id="scanBtn" type="button">QR 읽기</button>
        <button id="stopScanBtn" type="button" disabled>중지</button>
        <button id="copyAllBtn" type="button">QR 링크 전체 복사</button>
      </div>

      <div id="status" class="qr-status"></div>
      <div id="results" class="qr-results"></div>

      <textarea
        id="allLinks"
        readonly
        placeholder="QR에서 추출된 링크가 여기에 표시됩니다."></textarea>
    </div>

    <button class="main-btn" onclick="startPlaylist()">
      재생목록 만들기
    </button>

  </section>

  <section id="playerPage" class="player-page">

    <div class="topbar">
      <div>
        <div id="counter" class="counter"></div>
        <div id="title" class="title"></div>
      </div>

      <div class="top-buttons">
        <button id="homeBtn">🏠 홈</button>
        <button id="autoBtn">자동 다음: ON</button>
        <button id="fullscreenBtn">전체 화면 ⛶</button>
      </div>
    </div>

    <div id="videoFrame" class="video-frame">
      <div id="youtubePlayer"></div>
    </div>

    <div class="progress-wrap">
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <div id="progressText" class="progress-text"></div>

    <div class="buttons">
      <button id="prevBtn">◀ 이전</button>
      <button id="openBtn">유튜브에서 열기 ▶</button>
      <button id="nextBtn">다음 ▶</button>
    </div>

    <div class="shortcut">
      ␣ 재생/정지 · ← 이전 · → 다음 · F 전체화면 · A 자동다음
    </div>

  </section>

</div>

<script src="func.js"></script>

</body>
</html>
